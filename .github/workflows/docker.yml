name: Build & Push Docker Image

on:
  workflow_dispatch:
  push:
    branches: [hosted-runpod, main]
    paths:
      - 'comfy_runner/hosted/Dockerfile'
      - 'comfy_runner/hosted/startup.sh'

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Lowercase image name
        run: echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push CUDA 12.8 (default)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: comfy_runner/hosted/Dockerfile
          push: true
          build-args: CUDA_VERSION_DASH=12-8
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:cuda12.8

      - name: Build & push CUDA 13.0 (Blackwell/5090)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: comfy_runner/hosted/Dockerfile
          push: true
          build-args: CUDA_VERSION_DASH=13-0
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:cuda13.0
